{% extends "base.html" %}
{% block title %}Add Match - World Cup Tickets{% endblock %}

{% block content %}
<div class="form-card" style="max-width: 600px;">
    <h2>Add New Match</h2>
    <form method="POST">
        <div class="form-row">
            <div class="form-group">
                <label for="team1">Team 1</label>
                <input type="text" id="team1" name="team1" required>
            </div>
            <div class="form-group">
                <label for="team2">Team 2</label>
                <input type="text" id="team2" name="team2" required>
            </div>
        </div>
        <div class="form-group">
            <label for="stadium">Stadium</label>
            <input type="text" id="stadium" name="stadium" required>
        </div>
        <div class="form-group">
            <label for="match_date">Date &amp; Time (e.g. 2026-07-05 18:00)</label>
            <input type="text" id="match_date" name="match_date" placeholder="YYYY-MM-DD HH:MM" required>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="price">Price per Seat ($)</label>
                <input type="number" id="price" name="price" step="0.01" min="0" required>
            </div>
            <div class="form-group">
                <label for="total_seats">Total Seats</label>
                <input type="number" id="total_seats" name="total_seats" min="1" value="60" required>
            </div>
        </div>
        <button type="submit" class="btn btn-primary">Add Match</button>
    </form>
    <div class="form-footer">
        <a href="{{ url_for('admin_dashboard') }}">&larr; Back to Dashboard</a>
    </div>
</div>
{% endblock %}
